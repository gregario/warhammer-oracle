name: Sync BSData

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch latest BSData
        run: npm run fetch-data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for data changes
        id: diff
        run: |
          if git diff --quiet src/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Data is up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data has changed:"
            git diff --stat src/data/
          fi

      - name: Build
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Test
        if: steps.diff.outputs.changed == 'true'
        run: npm test

      - name: Commit updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git commit -m "chore: sync BSData ($(date -u +%Y-%m-%d))"
          git push

      - name: Bump version and publish to npm
        if: steps.diff.outputs.changed == 'true' && env.NPM_TOKEN != ''
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm version patch --no-git-tag-version
          npm run build
          npm publish --access public
          # Commit the version bump
          git add package.json package-lock.json
          git commit -m "chore: bump version for data sync publish"
          git push
